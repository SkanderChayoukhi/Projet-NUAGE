---
- name: Cold replica B - direct transfer primary to secondary
  hosts: pg_primary
  gather_facts: true
  become: true
  vars:
    pg_db_name: postgres
    pg_db_user: postgres
    backup_ts: "{{ ansible_date_time.iso8601_basic_short }}"
    remote_dump_path_primary: "/tmp/postgres_cold_replica_{{ backup_ts }}.sql"
    remote_dump_path_secondary: "/tmp/postgres_cold_replica_{{ backup_ts }}.sql"
    secondary_host: "{{ hostvars['postgres_secondary'].ansible_host }}"
    secondary_user: "{{ hostvars['postgres_secondary'].ansible_user }}"

  tasks:
    - name: Dump primary database on primary VM
      become_user: postgres
      ansible.builtin.command:
        cmd: "pg_dump -U {{ pg_db_user }} -d {{ pg_db_name }} -f {{ remote_dump_path_primary }}"
      tags:
        - dump

    - name: Transfer dump directly from primary VM to secondary VM
      # This is more efficient for large datasets because data does not transit through the Ansible controller.
      ansible.builtin.shell: |
        set -euo pipefail
        scp -o StrictHostKeyChecking=no "{{ remote_dump_path_primary }}" "{{ secondary_user }}@{{ secondary_host }}:{{ remote_dump_path_secondary }}"
      tags:
        - transfer

    - name: Remove temporary dump file on primary VM
      ansible.builtin.file:
        path: "{{ remote_dump_path_primary }}"
        state: absent
      tags:
        - cleanup

    - name: Drop replica database on secondary VM
      delegate_to: postgres_secondary
      become: true
      become_user: postgres
      community.postgresql.postgresql_db:
        name: "{{ pg_db_name }}"
        state: absent
      tags:
        - restore

    - name: Recreate replica database on secondary VM
      delegate_to: postgres_secondary
      become: true
      become_user: postgres
      community.postgresql.postgresql_db:
        name: "{{ pg_db_name }}"
        state: present
      tags:
        - restore

    - name: Restore dump on secondary VM using psql
      delegate_to: postgres_secondary
      become: true
      become_user: postgres
      ansible.builtin.command:
        cmd: "psql -U {{ pg_db_user }} -d {{ pg_db_name }} -f {{ remote_dump_path_secondary }}"
      tags:
        - restore

    - name: Remove temporary dump on secondary VM
      delegate_to: postgres_secondary
      become: true
      ansible.builtin.file:
        path: "{{ remote_dump_path_secondary }}"
        state: absent
      tags:
        - cleanup
