---
- name: Cold replica A - dump via controller then restore to secondary
  hosts: pg_primary
  gather_facts: true
  become: true
  vars:
    pg_db_name: postgres
    pg_db_user: postgres
    backup_ts: "{{ ansible_date_time.iso8601_basic_short }}"
    remote_dump_path_primary: "/tmp/postgres_cold_replica_{{ backup_ts }}.sql"
    local_backup_dir: "backups"
    local_backup_file: "{{ local_backup_dir }}/postgres_cold_replica_{{ backup_ts }}.sql"
    remote_dump_path_secondary: "/tmp/postgres_cold_replica_{{ backup_ts }}.sql"

  tasks:
    - name: Ensure local backup directory exists on controller
      delegate_to: localhost
      become: false
      ansible.builtin.file:
        path: "{{ local_backup_dir }}"
        state: directory
        mode: "0755"

    - name: Dump primary database on primary VM
      become_user: postgres
      ansible.builtin.command:
        cmd: "pg_dump -U {{ pg_db_user }} -d {{ pg_db_name }} -f {{ remote_dump_path_primary }}"

    - name: Fetch dump from primary VM to Ansible controller
      ansible.builtin.fetch:
        src: "{{ remote_dump_path_primary }}"
        dest: "{{ local_backup_file }}"
        flat: true

    - name: Remove temporary dump file on primary VM
      ansible.builtin.file:
        path: "{{ remote_dump_path_primary }}"
        state: absent

    - name: Drop replica database on secondary VM
      delegate_to: postgres_secondary
      become: true
      become_user: postgres
      community.postgresql.postgresql_db:
        name: "{{ pg_db_name }}"
        state: absent

    - name: Recreate replica database on secondary VM
      delegate_to: postgres_secondary
      become: true
      become_user: postgres
      community.postgresql.postgresql_db:
        name: "{{ pg_db_name }}"
        state: present

    - name: Copy dump from controller to secondary VM
      delegate_to: postgres_secondary
      become: true
      ansible.builtin.copy:
        src: "{{ local_backup_file }}"
        dest: "{{ remote_dump_path_secondary }}"
        mode: "0644"

    - name: Restore dump on secondary VM using psql
      delegate_to: postgres_secondary
      become: true
      become_user: postgres
      ansible.builtin.command:
        cmd: "psql -U {{ pg_db_user }} -d {{ pg_db_name }} -f {{ remote_dump_path_secondary }}"

    - name: Remove temporary dump on secondary VM
      delegate_to: postgres_secondary
      become: true
      ansible.builtin.file:
        path: "{{ remote_dump_path_secondary }}"
        state: absent
