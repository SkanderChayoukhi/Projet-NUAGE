all:
  children:
    postgres_vm:
      hosts:
        postgres_primary:
          # Replace with the primary OpenStack VM public or reachable IP address
          ansible_host: "REPLACE_WITH_PRIMARY_VM_IP"
          # Replace with the SSH username used to connect to the primary VM
          ansible_user: "REPLACE_WITH_SSH_USER"
          # Replace with the SSH password for the primary VM user
          ansible_password: "REPLACE_WITH_SSH_PASSWORD"
          ansible_port: 22
          ansible_connection: ssh

        postgres_secondary:
          # Replace with the secondary OpenStack VM public or reachable IP address
          ansible_host: "REPLACE_WITH_SECONDARY_VM_IP"
          # Replace with the SSH username used to connect to the secondary VM
          ansible_user: "REPLACE_WITH_SSH_USER"
          # Replace with the SSH password for the secondary VM user
          ansible_password: "REPLACE_WITH_SSH_PASSWORD"
          ansible_port: 22
          ansible_connection: ssh

    pg_primary:
      hosts:
        postgres_primary:

    pg_secondary:
      hosts:
        postgres_secondary:
