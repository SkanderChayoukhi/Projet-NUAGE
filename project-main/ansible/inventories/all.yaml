all:
  children:
    postgres_vm:
      hosts:
        postgres_target:
          # Replace with your OpenStack VM public or reachable IP address
          ansible_host: "REPLACE_WITH_VM_IP"
          # Replace with the SSH username used to connect to the VM
          ansible_user: "REPLACE_WITH_SSH_USER"
          # Replace with the SSH password for the user above
          ansible_password: "REPLACE_WITH_SSH_PASSWORD"
          ansible_port: 22
          ansible_connection: ssh
