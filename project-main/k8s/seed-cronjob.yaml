apiVersion: batch/v1
kind: CronJob
metadata:
  name: seed-data-cron
  labels:
    app: seed-data
spec:
  schedule: "@daily"
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          restartPolicy: Never
          containers:
          - name: seed-data
            image: europe-west3-docker.pkg.dev/tuto-devops-490710/voting-image/seed-data
            imagePullPolicy: IfNotPresent
            env:
            - name: TARGET_URL
              value: "http://nginx:8000"
            command: ["/bin/sh", "-c", "./generate-votes.sh"]
