apiVersion: apps/v1
kind: Deployment
metadata:
  name: db
  labels:
    app: db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: db
  template:
    metadata:
      labels:
        app: db
    spec:
      initContainers:
        - name: install-healthcheck
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - cp /config/postgres.sh /healthchecks/postgres.sh && chmod +x /healthchecks/postgres.sh
          volumeMounts:
            - name: healthcheck-script
              mountPath: /config
            - name: healthchecks
              mountPath: /healthchecks
      containers:
        - name: db
          image: postgres:15-alpine
          imagePullPolicy: IfNotPresent
          env:
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              value: postgres
            - name: POSTGRES_DB
              value: postgres
          ports:
   The tutorial on Terraform did not give you _all_ elements for this project: it was on purpose.
The point is for you to learn how to seek information in providers and other documentations.
But most elements in the tutorials can be directly applied.

**IMPORTANT**: Make sure to organize your Terraform code well. Attention will be given to the repo organization, README, variable files, etc.
The different parts of Terraform code should be segmented within directories. To be able to use the data from other directories, use either a local _module_ or a `terraform_remote_state` resource which allows you to refer to output variables.         - containerPort: 5432
          livenessProbe:
            exec:
              command:
                - sh
                - /healthchecks/postgres.sh
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: db-data
              mountPath: /var/lib/postgresql/data
              subPath: data
            - name: healthchecks
              mountPath: /healthchecks
      volumes:
        - name: healthcheck-script
          configMap:
            name: postgres-healthcheck
        - name: healthchecks
          emptyDir: {}
        - name: db-data
          persistentVolumeClaim:
            claimName: db-data
