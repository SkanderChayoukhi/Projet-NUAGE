apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  labels:
    app: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      initContainers:
        - name: install-healthcheck
          image: busybox:1.36
          imagePullPolicy: Never
          command:
            - sh
            - -c
            - |
              cat <<'EOF' > /healthchecks/redis.sh
              #!/bin/sh
              set -eo pipefail

              host="$(hostname -i || echo '127.0.0.1')"

              if ping="$(redis-cli -h "$host" ping)" && [ "$ping" = 'PONG' ]; then
                exit 0
              fi

              exit 1
              EOF
              chmod +x /healthchecks/redis.sh
          volumeMounts:
            - name: healthchecks
              mountPath: /healthchecks
      containers:
        - name: redis
          image: redis:alpine
          imagePullPolicy: Never
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          ports:
            - containerPort: 6379
          livenessProbe:
            exec:
              command:
                - sh
                - /healthchecks/redis.sh
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: healthchecks
              mountPath: /healthchecks
      volumes:
        - name: healthchecks
          emptyDir: {}