apiVersion: apps/v1
kind: Deployment
metadata:
  name: db
  labels:
    app: db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: db
  template:
    metadata:
      labels:
        app: db
    spec:
      initContainers:
        - name: install-healthcheck
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              cat <<'EOF' > /healthchecks/postgres.sh
              #!/bin/sh
              set -eo pipefail

              host="$(hostname -i || echo '127.0.0.1')"
              user="${POSTGRES_USER:-postgres}"
              db="${POSTGRES_DB:-$POSTGRES_USER}"
              export PGPASSWORD="${POSTGRES_PASSWORD:-}"

              if select="$(echo 'SELECT 1' | psql --host "$host" --username "$user" --dbname "$db" --quiet --no-align --tuples-only)" \
                && [ "$select" = '1' ]; then
                exit 0
              fi

              exit 1
              EOF
              chmod +x /healthchecks/postgres.sh
          volumeMounts:
            - name: healthchecks
              mountPath: /healthchecks
      containers:
        - name: db
          image: postgres:15-alpine
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: app-config
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          ports:
            - containerPort: 5432
          livenessProbe:
            exec:
              command:
                - sh
                - /healthchecks/postgres.sh
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: db-data
              mountPath: /var/lib/postgresql/data
              subPath: data
            - name: healthchecks
              mountPath: /healthchecks
      volumes:
        - name: healthchecks
          emptyDir: {}
        - name: db-data
          persistentVolumeClaim:
            claimName: db-data
